<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SILT — delta prototype</title>
<style>
  :root{
    --bg:#0d1518; --panel:#121e22; --line:#20343a; --ink:#dfeaec; --dim:#7e969c;
    --water:#2b6f8a; --silt:#5a4a35; --dead:#33241a;
    --p0:#e0a458; --p1:#7fb2d9; --p2:#8fce7a; --p3:#d97f9e;
    --timber:#b5763c; --grain:#d4c060; --salt:#9fd8e0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex;height:100vh;overflow:hidden}
  #board{flex:1;position:relative;min-width:0}
  svg{width:100%;height:100%;display:block}
  aside{width:340px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden}
  header{padding:12px 14px;border-bottom:1px solid var(--line)}
  h1{margin:0;font-size:15px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .sub{color:var(--dim);font-size:12px;margin-top:3px}
  .pane{padding:12px 14px;border-bottom:1px solid var(--line)}
  .pane h2{margin:0 0 8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--dim);font-weight:600}
  .players{display:flex;flex-direction:column;gap:6px}
  .pl{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;
    background:#0c1619;border:1px solid transparent;font-size:13px}
  .pl.me{border-color:var(--line)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .pl .nm{flex:1;font-weight:500}
  .pl .st{color:var(--dim);font-size:12px;font-variant-numeric:tabular-nums}
  .slots{display:flex;gap:8px;margin-bottom:10px}
  .slot{flex:1;height:52px;border:1px dashed var(--line);border-radius:6px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;background:#0c1619;transition:.12s}
  .slot.on{border-style:solid;border-color:var(--p0);background:#16232a}
  .slot .n{font-size:10px;color:var(--dim);letter-spacing:.1em}
  .slot .a{font-weight:600;text-transform:capitalize;font-size:13px}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  button{font:inherit;color:var(--ink);background:#16252b;border:1px solid var(--line);
    border-radius:5px;padding:8px;cursor:pointer;transition:.12s;text-align:left}
  button:hover:not(:disabled){background:#1d3138;border-color:#31505a}
  button:disabled{opacity:.35;cursor:not-allowed}
  button.sel{background:#24414c;border-color:var(--p0)}
  .act .t{font-weight:600;text-transform:capitalize}
  .act .d{font-size:11px;color:var(--dim);margin-top:1px}
  #go{width:100%;margin-top:10px;text-align:center;font-weight:600;
    background:var(--p0);color:#10191c;border-color:var(--p0)}
  #go:disabled{background:#16252b;color:var(--dim);border-color:var(--line)}
  .log{flex:1;overflow-y:auto;padding:10px 14px;font-size:12px;line-height:1.6}
  .log div{color:var(--dim);padding:1px 0}
  .log div.hd{color:var(--ink);font-weight:600;margin-top:8px;
    border-top:1px solid var(--line);padding-top:6px}
  .ctr{color:var(--dim);font-size:12px;font-variant-numeric:tabular-nums}
  .ct{font-size:12px;padding:3px 0;border-bottom:1px solid #18272c;color:var(--dim)}
  .ct b{color:var(--ink)}
  .prompt{background:#1b2c33;border:1px solid var(--p0);border-radius:5px;
    padding:8px;font-size:12px;margin-bottom:8px}
  text{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;user-select:none}
  .node{cursor:pointer}
  .node:hover circle{stroke:#fff}
  #ov{position:absolute;inset:0;background:rgba(8,14,16,.94);display:none;
    align-items:center;justify-content:center}
  #ov.on{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:22px 26px;min-width:380px}
  .card h2{margin:0 0 14px;font-size:16px;letter-spacing:.1em;text-transform:uppercase}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th,td{text-align:right;padding:5px 7px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase}
  tr.win td{color:var(--p0);font-weight:600}
</style>
</head>
<body>
<div id="board">
  <svg id="svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="ov"><div class="card"><h2>Final score</h2><div id="final"></div></div></div>
</div>

<aside>
  <header>
    <h1>Silt</h1>
    <div class="sub"><span id="rd">Round 1 / 8</span> · <span id="ph">Program</span></div>
  </header>

  <div class="pane">
    <h2>Players</h2>
    <div class="players" id="pls"></div>
  </div>

  <div class="pane" id="ctrl">
    <h2>Your program</h2>
    <div id="hint" class="prompt" style="display:none"></div>
    <div class="slots">
      <div class="slot" id="s0" data-slot="0"><div class="n">SLOT 1</div><div class="a">—</div></div>
      <div class="slot" id="s1" data-slot="1"><div class="n">SLOT 2</div><div class="a">—</div></div>
    </div>
    <div class="acts" id="acts"></div>
    <button id="go" disabled>Commit &amp; resolve</button>
  </div>

  <div class="pane">
    <h2>Contracts</h2>
    <div id="cts"></div>
  </div>

  <div class="log" id="log"></div>
</aside>

<script type="module" src="./ui.js"></script>
</body>
</html>
