<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<title>ANOD — a river delta game</title>
<style>
  :root{
    --bg:#232e28; --panel:#2b3830; --panel2:#26322b; --line:#3e5046; --line2:#57705f;
    --ink:#f4f1e8; --dim:#bcc8bb; --dim2:#93a394;
    --water3:#5fb3a8; --water2:#6f9a7e; --water1:#a99a5e; --dead:#6b4a2c;
    --gold:#f2c56f;
    --p0:#f2c56f; --p1:#79c6d6; --p2:#a8d97a; --p3:#e89a86;
    --timber:#b6d47f; --grain:#f0d97a; --salt:#d8ecea;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}

  /* ---------- menu ---------- */
  #menu{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 700px at 50% 25%,color-mix(in srgb,var(--panel) 70%,var(--gold) 6%) 0%,var(--bg) 72%)}
  #menu.hide{display:none}
  .menuCard{width:min(680px,92vw);max-height:92vh;overflow-y:auto;padding:26px 38px}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:6px}
  .brand svg{width:46px;height:46px;color:var(--gold);flex:none}
  .brand h1{margin:0;font-size:38px;letter-spacing:.28em;font-weight:600}
  .tag{color:var(--dim);margin:0 0 20px;font-size:14.5px;line-height:1.5}
  .tag b{color:var(--ink);font-weight:500}
  .fieldset{margin-bottom:16px}
  .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
    margin-bottom:7px;font-weight:600}
  .opts{display:flex;gap:8px;flex-wrap:wrap}
  .opt{flex:1;min-width:86px;padding:9px 8px;border:1px solid var(--line);border-radius:7px;
    background:var(--panel2);cursor:pointer;text-align:center;transition:.13s;color:var(--ink);
    font:inherit}
  .opt:hover{border-color:var(--line2);background:color-mix(in srgb,var(--panel) 80%,var(--ink) 6%)}
  .opt.on{border-color:var(--gold);background:color-mix(in srgb,var(--panel) 70%,var(--gold) 14%);box-shadow:inset 0 0 0 1px rgba(224,164,88,.25)}
  .opt .k{font-weight:600;font-size:14px}
  .opt .v{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.35}
  .botRow{display:flex;align-items:center;gap:10px;padding:6px 10px;border:1px solid var(--line);
    border-radius:7px;background:var(--panel2);margin-bottom:6px}
  .botRow .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .botRow .nm{width:58px;color:var(--dim);font-size:12px}
  .botRow select{flex:1;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:5px;padding:6px 8px;font:inherit;cursor:pointer}
  .botRow select:focus{outline:none;border-color:var(--gold)}
  .botRow .desc{font-size:11px;color:var(--dim2);width:150px;text-align:right;line-height:1.3}
  .go{display:flex;gap:10px;margin-top:18px}
  .btnBig{flex:1;padding:13px;border-radius:8px;border:1px solid var(--gold);background:var(--gold);
    color:var(--bg);font:inherit;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.04em;
    transition:.13s}
  .btnBig:hover{filter:brightness(1.08)}
  .btnGhost{flex:1;padding:13px;border-radius:8px;border:1px solid var(--line2);
    background:transparent;color:var(--ink);font:inherit;font-weight:600;font-size:15px;
    cursor:pointer;transition:.13s}
  .btnGhost:hover{background:color-mix(in srgb,var(--panel) 80%,var(--ink) 6%);border-color:var(--gold);color:var(--gold)}
  .btnNarrow{flex:0 0 auto;padding-left:20px;padding-right:20px}
  #gloss{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  #gloss summary{cursor:pointer;color:var(--dim);font-size:12px;letter-spacing:.06em;
    list-style:none;user-select:none}
  #gloss summary::-webkit-details-marker{display:none}
  #gloss summary::before{content:'▸ ';color:var(--gold)}
  #gloss[open] summary::before{content:'▾ '}
  #gloss summary:hover{color:var(--ink)}
  .glossBody{margin-top:12px;font-size:12.5px;line-height:1.6;color:var(--dim)}
  .glossBody h5{margin:12px 0 5px;font-size:10px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--dim2);font-weight:600}
  .glossBody dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:3px 12px}
  .glossBody dt{color:var(--gold);font-weight:600;white-space:nowrap}
  .glossBody dd{margin:0}
  .glossBody p{margin:10px 0 0;font-size:12px;line-height:1.6}


  /* short viewports: the menu must fit without scrolling */
  @media (max-height: 860px) {
    .menuCard{padding:20px 34px}
    .brand{margin-bottom:4px}
    .brand h1{font-size:32px}
    .brand svg{width:38px;height:38px}
    .tag{font-size:13.5px;margin-bottom:16px;line-height:1.45}
    .fieldset{margin-bottom:13px}
    .opt{padding:8px}
    .opt .v{font-size:10px}
    .botRow{padding:5px 9px;margin-bottom:5px}
    .go{margin-top:14px}
    .btnBig,.btnGhost{padding:11px;font-size:14px}
    #gloss{display:none!important}
  }
  @media (max-height: 700px) {
    .menuCard{padding:16px 30px}
    .brand h1{font-size:27px}
    .brand svg{width:32px;height:32px}
    .tag{font-size:12.5px;margin-bottom:12px}
    .fieldset{margin-bottom:10px}
    .lbl{margin-bottom:5px}
    .opt{padding:7px}
    .opt .v{display:none}
    .botRow .desc{display:none}
  }

  /* ---------- game ---------- */
  #game{display:flex;height:100vh}
  #game.hide{display:none}
  #board{flex:1;position:relative;min-width:0}
  #svg{width:100%;height:100%;display:block}
  /* Effects overlay sits exactly on the board and never intercepts a click. */
  #fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}

  /* Who is acting right now. */
  #actor{position:absolute;top:10px;left:50%;transform:translateX(-50%) translateY(-6px);
    z-index:3;pointer-events:none;opacity:0;transition:opacity .16s,transform .16s;
    font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;
    padding:5px 13px;border-radius:999px;background:color-mix(in srgb,var(--bg) 82%,transparent);
    border:1px solid var(--line);backdrop-filter:blur(3px);white-space:nowrap}
  #actor.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .icoBtn.muted{opacity:.5}

  /* ---- effect animations -------------------------------------------------
     Every effect is a one-shot that removes itself. Keep durations under ~1s:
     these fire several times per round and a slow effect becomes a wait. */
  #fx text{font:600 3.1px ui-sans-serif,system-ui,sans-serif;paint-order:stroke;
    stroke:var(--bg);stroke-width:.7px;stroke-linejoin:round}
  .fxFloat{animation:fxFloat 1.25s ease-out forwards;opacity:0}
  @keyframes fxFloat{
    0%{opacity:0;transform:translateY(1.2px)}
    18%{opacity:1}
    70%{opacity:1}
    100%{opacity:0;transform:translateY(-3.4px)}}
  .fxCoin{fill:var(--gold)}
  .fxVp{fill:var(--good);font-size:3.6px}
  .fxToll{fill:var(--warn)}
  .fxSpend{fill:var(--dim2)}
  .fxBad{fill:var(--bad)}
  .fxGood{fill:var(--good)}

  /* A boat actually travelling the route — the difference between "this path is
     highlighted" and "a shipment is happening". */
  .fxBoat{animation:fxBoatIn .18s ease-out}
  @keyframes fxBoatIn{from{opacity:0}to{opacity:1}}
  /* Wake trailing the boat, drawn with a dash offset so it wipes on. */
  .fxWake{animation:fxWake .26s ease-out forwards;opacity:0;
    stroke-dasharray:24;stroke-dashoffset:24}
  @keyframes fxWake{
    0%{opacity:0;stroke-dashoffset:24}
    30%{opacity:.85}
    100%{opacity:0;stroke-dashoffset:0}}

  .fxDredge{animation:fxDredge .8s ease-out forwards;opacity:0}
  @keyframes fxDredge{0%{opacity:0}25%{opacity:.9}100%{opacity:0}}

  /* Silting: a slow choke, not a flash. Reads as the water giving up. */
  .fxSilt{animation:fxSilt .95s ease-in forwards;opacity:0}
  @keyframes fxSilt{0%{opacity:0}35%{opacity:.75}100%{opacity:0}}
  .fxDie{animation:fxDie 1s ease-in forwards;opacity:0}
  @keyframes fxDie{
    0%{opacity:0}20%{opacity:1}55%{opacity:.9}100%{opacity:0}}

  .fxBlock{animation:fxBlock .9s ease-out forwards;opacity:0}
  @keyframes fxBlock{
    0%,42%{opacity:0}12%,28%{opacity:1}100%{opacity:0}}

  .fxRing{animation:fxRing .85s ease-out forwards;opacity:0;
    transform-box:fill-box;transform-origin:center}
  @keyframes fxRing{
    0%{opacity:.95;transform:scale(.55)}
    100%{opacity:0;transform:scale(1.7)}}
  .fxFade{animation:fxFade .85s ease-out forwards}
  @keyframes fxFade{0%{opacity:.9}100%{opacity:0}}

  /* Motion sensitivity: effects still convey information, just without travel.
     Turning them off entirely would remove the feedback the user asked for. */
  @media (prefers-reduced-motion:reduce){
    .fxFloat{animation-duration:.9s}
    .fxWake,.fxBoat{display:none}
    .fxDredge,.fxSilt,.fxDie,.fxBlock,.fxRing,.fxFade{animation-duration:.5s}
  }
  aside{width:352px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden}
  header{padding:12px 15px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;gap:10px}
  header svg{width:22px;height:22px;color:var(--gold);flex:none}
  header .t{flex:1}
  header h2{margin:0;font-size:14px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  header .sub{color:var(--dim);font-size:12px;margin-top:2px}
  .icoBtn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:5px;
    padding:5px 9px;cursor:pointer;font:inherit;font-size:11px}
  .icoBtn:hover{color:var(--ink);border-color:var(--line2)}
  .pane{padding:11px 15px;border-bottom:1px solid var(--line)}
  .pane h3{margin:0 0 8px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);font-weight:600}
  .pl{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;
    background:var(--panel2);border:1px solid transparent;font-size:13px;margin-bottom:5px}
  .pl.me{border-color:var(--line2)}
  .pl .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .pl .nm{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl .st{color:var(--dim);font-size:12px;font-variant-numeric:tabular-nums;flex:none}
  .slots{display:flex;gap:8px;margin-bottom:9px}
  .slot{flex:1;height:56px;border:1px dashed var(--line2);border-radius:7px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    cursor:pointer;background:var(--panel2);transition:.13s}
  .slot.on{border-style:solid;border-color:var(--gold);background:color-mix(in srgb,var(--panel) 70%,var(--gold) 12%)}
  .slot.filled{border-style:solid;border-color:var(--line2)}
  .slot svg{width:19px;height:19px;color:var(--gold)}
  .slot .n{font-size:9px;color:var(--dim2);letter-spacing:.12em}
  .slot .a{font-weight:600;font-size:12px;text-transform:capitalize}
  .slot .g{font-size:9px;color:var(--dim2);text-transform:lowercase;margin-top:-1px}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .act{display:flex;gap:8px;align-items:flex-start;padding:9px;border-radius:6px;
    border:1px solid var(--line);background:var(--panel2);color:var(--ink);font:inherit;
    cursor:pointer;text-align:left;transition:.13s}
  .act:hover:not(:disabled){background:color-mix(in srgb,var(--panel) 75%,var(--ink) 8%);border-color:var(--line2)}
  .act:disabled{opacity:.35;cursor:not-allowed}
  .act svg{width:17px;height:17px;color:var(--gold);flex:none;margin-top:1px}
  .act .txt{display:flex;flex-direction:column;min-width:0}
  .act .t{font-weight:600;text-transform:capitalize;font-size:13px;line-height:1.2}
  .act .t em{font-style:normal;font-weight:400;color:var(--dim2);font-size:10px;
    text-transform:lowercase;margin-left:5px}
  .act .d{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.35}
  #go{width:100%;margin-top:9px;padding:11px;border-radius:6px;border:1px solid var(--gold);
    background:var(--gold);color:var(--bg);font:inherit;font-weight:700;cursor:pointer;
    letter-spacing:.03em}
  #go:disabled{background:var(--panel2);color:var(--dim2);border-color:var(--line);cursor:not-allowed}
  .prompt{background:color-mix(in srgb,var(--panel) 70%,var(--gold) 12%);border:1px solid var(--gold);border-radius:6px;padding:9px 10px;
    font-size:12px;margin-bottom:9px;color:var(--ink);line-height:1.4}
  .ct{font-size:12px;padding:5px 0;border-bottom:1px solid var(--line);color:var(--dim);
    display:flex;gap:7px;align-items:baseline}
  .ct:last-child{border-bottom:none}
  .ct .vp{color:var(--gold);font-weight:700;flex:none;font-variant-numeric:tabular-nums}
  .log{flex:1;overflow-y:auto;padding:9px 15px;font-size:12px;line-height:1.55}
  .log div{color:var(--dim);padding:1px 0}
  .log div.hd{color:var(--ink);font-weight:600;margin-top:7px;border-top:1px solid var(--line);
    padding-top:6px}
  .log div.me{color:var(--gold)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
  .legend i{display:inline-block;width:16px;height:3px;border-radius:2px;margin-right:5px;
    vertical-align:middle}

  /* ---------- overlays ---------- */
  #ov{position:absolute;inset:0;background:color-mix(in srgb,var(--bg) 94%,transparent);display:none;
    align-items:center;justify-content:center;z-index:20}
  #ov.on{display:flex}
  .card{background:var(--panel);border:1px solid var(--line2);border-radius:10px;
    padding:24px 28px;min-width:430px;max-width:90%}
  .card h2{margin:0 0 15px;font-size:16px;letter-spacing:.12em;text-transform:uppercase}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th,td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  tr.win td{color:var(--gold);font-weight:700}
  .card .go{margin-top:18px}

  #tut{position:absolute;left:22px;top:22px;width:340px;z-index:30;
    background:var(--panel);border:1px solid var(--gold);border-radius:10px;padding:16px 18px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);display:none}
  #tut.on{display:block}
  #tut .step{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    font-weight:700;margin-bottom:6px}
  #tut h4{margin:0 0 7px;font-size:15px;font-weight:600}
  #tut p{margin:0 0 13px;color:var(--dim);font-size:12.5px;line-height:1.5}
  #tut .row{display:flex;gap:8px;align-items:center}
  #tut button{padding:8px 14px;border-radius:6px;font:inherit;font-size:12px;cursor:pointer;
    font-weight:600}
  #tutNext{background:var(--gold);border:1px solid var(--gold);color:var(--bg)}
  #tutSkip,#tutSkipStep{background:transparent;border:1px solid var(--line2);color:var(--dim)}
  #tutSkipStep:hover,#tutSkip:hover{color:var(--ink);border-color:var(--gold)}
  #tutSkip:hover{color:var(--ink)}
  #tut .wait{font-size:11px;color:var(--gold);opacity:.9;flex:1;line-height:1.35}
  #tut .row{flex-wrap:wrap}


  /* ---------- rulebook ---------- */
  #book{position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 96%,transparent);display:none;
    align-items:center;justify-content:center;z-index:80;padding:20px}
  #book.on{display:flex}
  .bookCard{background:var(--panel);border:1px solid var(--line2);border-radius:12px;
    width:min(620px,100%);max-height:88vh;display:flex;flex-direction:column;
    box-shadow:0 24px 70px rgba(0,0,0,.6)}
  .bookHead{display:flex;align-items:flex-start;gap:12px;padding:20px 24px 14px;
    border-bottom:1px solid var(--line)}
  .bookHead>div{flex:1}
  .bookTitle{font-size:20px;font-weight:600;letter-spacing:.02em}
  .bookSub{color:var(--dim);font-size:12px;margin-top:3px}
  .bookBody{padding:18px 24px;overflow-y:auto;flex:1;font-size:13.5px;line-height:1.65;
    color:var(--ink)}
  .bookBody p{margin:0 0 12px;color:var(--dim)}
  .bookBody p b,.bookBody li b,.bookBody dd b{color:var(--ink)}
  .bookBody p.warn{color:var(--ink);background:color-mix(in srgb,var(--panel) 70%,var(--gold) 14%);border-left:2px solid var(--gold);
    padding:9px 12px;border-radius:0 5px 5px 0}
  .bookBody p.tip{color:var(--dim);border-left:2px solid var(--line2);padding:2px 0 2px 12px}
  .bookBody ol,.bookBody ul{margin:0 0 12px;padding-left:20px;color:var(--dim)}
  .bookBody li{margin-bottom:7px}
  .bookBody dl.acts{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;margin:0 0 12px}
  .bookBody dl.acts dt{color:var(--gold);font-weight:600;white-space:nowrap}
  .bookBody dl.acts dt em{display:block;font-style:normal;font-weight:400;font-size:10px;
    color:var(--dim2);text-transform:lowercase}
  .bookBody dl.acts dt.neg{color:var(--p3)}
  .bookBody dl.acts dd{margin:0;color:var(--dim)}
  table.depth{border-collapse:collapse;margin:0 0 12px;font-size:13px}
  table.depth td{padding:4px 10px 4px 0;border:none;text-align:left;color:var(--dim)}
  table.depth i{display:inline-block;width:26px;height:5px;border-radius:3px}
  table.depth i.d3{background:var(--water3)} table.depth i.d2{background:var(--water2)}
  table.depth i.d1{background:var(--water1)}
  table.depth i.d0{background:var(--dead);outline:1px dashed #6b4a2c}
  .bookFoot{display:flex;align-items:center;gap:12px;padding:13px 24px;
    border-top:1px solid var(--line)}
  .pageBtn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    border-radius:6px;padding:9px 15px;font:inherit;font-size:13px;cursor:pointer;
    font-weight:600}
  .pageBtn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
  .pageBtn:disabled{opacity:.3;cursor:not-allowed}
  .dots{flex:1;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .dots button{width:8px;height:8px;border-radius:50%;border:none;padding:0;
    background:var(--line2);cursor:pointer;transition:.13s}
  .dots button.on{background:var(--gold);transform:scale(1.3)}
  .dots button:hover{background:var(--dim)}
  @media (max-width: 820px), (pointer: coarse) and (max-width: 1024px){
    #book{padding:0;align-items:stretch}
    .bookCard{width:100%;max-height:100dvh;border-radius:0;border:none}
    .bookHead{padding:16px 18px 12px}
    .bookBody{padding:16px 18px}
    .bookFoot{padding:12px 18px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
    .pageBtn{padding:12px 16px}
    .dots button{width:10px;height:10px}
  }

  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{filter:none}50%{filter:drop-shadow(0 0 7px var(--gold))}}
  .uiPulse{box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(224,164,88,.45)!important;
    border-radius:7px}
  text{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;user-select:none}
  #svg .empty{opacity:.2}
  .node{cursor:default}

  /* ---------- mobile ----------
     Phones get a stacked layout: board on top, a scrollable control sheet below.
     The log and legend collapse behind a toggle so the action buttons and the
     commit button are always reachable without scrolling. */
  @media (max-width: 820px), (pointer: coarse) and (max-width: 1024px) {
    body{overflow:auto}
    #game{flex-direction:column;height:100dvh}
    #board{flex:0 0 auto;height:52dvh;min-height:280px}
    aside{width:100%;border-left:none;border-top:1px solid var(--line);
      flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
    header{position:sticky;top:0;z-index:5;background:var(--panel)}
    .pane{padding:10px 13px}
    /* players go horizontal to save vertical space */
    #pls{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
    .pl{margin-bottom:0;flex:0 0 auto;font-size:12px;padding:5px 8px}
    .pl .nm{max-width:88px}
    .acts{grid-template-columns:1fr 1fr;gap:7px}
    .act{padding:11px 9px}
    .act .t{font-size:14px}
    .slot{height:62px}
    #go{padding:15px;font-size:15px}
    /* bigger tap targets */
    .opt{padding:14px 10px;min-width:0}
    .btnBig,.btnGhost{padding:16px}
    .botRow{flex-wrap:wrap;gap:7px}
    .botRow .desc{width:100%;text-align:left;order:3}
    .botRow select{padding:9px}
    .menuCard{padding:22px 20px}
    .brand h1{font-size:32px;letter-spacing:.22em}
    .brand svg{width:40px;height:40px}
    .tag{font-size:14px;margin-bottom:20px}
    /* collapse the log by default on phones */
    .log{max-height:150px;flex:0 0 auto}
    #legendPane{display:none}
    #legendPane.show{display:block}
    .card{min-width:0;width:calc(100vw - 32px);padding:18px 16px}
    table{font-size:12px}
    th,td{padding:5px 4px}
    #tut{left:10px;right:10px;top:10px;width:auto;padding:13px 15px}
    #tut p{font-size:12px}
  }

  /* very small phones */
  @media (max-width: 340px) {
    .acts{grid-template-columns:1fr}
    .opts{gap:6px}
    .opt .v{font-size:10px}
    #board{height:44dvh}
  }

  /* landscape phone: go back side-by-side, the board is wider than it is tall */
  @media (max-height: 500px) and (orientation: landscape) {
    #game{flex-direction:row}
    #board{flex:1;height:100dvh}
    aside{width:300px;border-top:none;border-left:1px solid var(--line)}
    .log{max-height:none;flex:1 1 auto}
  }

</style>
</head>
<body>

<div id="sprites"></div>

<!-- ================= MENU ================= -->
<div id="menu">
  <div class="menuCard">
    <div class="brand">
      <svg><use href="#ic-river" data-logo/></svg>
      <h1 id="mTitle">ANOD</h1>
    </div>
    <p class="tag" id="mPitch"></p>

    <div class="fieldset">
      <div class="lbl">Theme</div>
      <div class="opts" id="themeOpts">
        <button class="opt on" data-theme="anod"><div class="k">Anód</div>
          <div class="v">Pasig delta, c. 1400s</div></button>
        <button class="opt" data-theme="silt"><div class="k">Silt</div>
          <div class="v">generic river delta</div></button>
      </div>
    </div>

    <div class="fieldset">
      <div class="lbl">Players</div>
      <div class="opts" id="pcOpts">
        <button class="opt" data-pc="2"><div class="k">2</div><div class="v">duel</div></button>
        <button class="opt on" data-pc="3"><div class="k">3</div><div class="v">balanced</div></button>
        <button class="opt" data-pc="4"><div class="k">4</div><div class="v">crowded</div></button>
      </div>
    </div>

    <div class="fieldset">
      <div class="lbl">Opponents</div>
      <div id="botRows"></div>
    </div>

    <div class="fieldset">
      <div class="lbl">Length</div>
      <div class="opts" id="lenOpts">
        <button class="opt" data-len="5"><div class="k">Short</div><div class="v">5 rounds</div></button>
        <button class="opt on" data-len="8"><div class="k">Standard</div><div class="v">8 rounds</div></button>
        <button class="opt" data-len="11"><div class="k">Long</div><div class="v">11 rounds</div></button>
      </div>
    </div>

    <div class="go">
      <button class="btnBig" id="btnPlay">Play</button>
      <button class="btnGhost" id="btnTutorial">Guided first game</button>
      <button class="btnGhost btnNarrow" id="btnRulesMenu">Rules</button>
    </div>

    <details id="gloss">
      <summary>What the words mean</summary>
      <div class="glossBody" id="glossBody"></div>
    </details>
  </div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="hide">
  <div id="board">
    <!-- padded viewBox: node art and labels overflow the 0..100 layout coords -->
  <svg id="svg" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet"></svg>
    <!-- Effects overlay. drawBoard() wipes #svg on every render, which would kill
         any animation mid-flight, so effects live in their own layer that nothing
         else clears. Same viewBox, so board coords need no transform. It must
         never eat clicks — the board underneath owns all interaction. -->
    <svg id="fx" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
    <!-- Whose action is currently resolving. Four players resolving in sequence
         is unreadable without this: you see effects with no author. -->
    <div id="actor" aria-live="polite"></div>

    <div id="tut">
      <div class="step" id="tutStep"></div>
      <h4 id="tutTitle"></h4>
      <p id="tutBody"></p>
      <div class="row">
        <button id="tutNext">Next</button>
        <button id="tutSkipStep">Skip step</button>
        <button id="tutSkip">Skip tutorial</button>
        <span class="wait" id="tutWait"></span>
      </div>
    </div>

    <div id="ov"><div class="card">
      <h2>Final score</h2>
      <div id="final"></div>
      <div class="go">
        <button class="btnBig" id="btnAgain">Play again</button>
        <button class="btnGhost" id="btnMenu">Menu</button>
      </div>
    </div></div>
  </div>

  <aside>
    <header>
      <svg><use href="#ic-river" data-logo/></svg>
      <div class="t">
        <h2 id="hTitle">ANOD</h2>
        <div class="sub"><span id="rd">Round 1 / 8</span> · <span id="ph">Program</span></div>
      </div>
      <!-- Animations you cannot skip become an annoyance by round 3. -->
      <button class="icoBtn" id="btnSpeed" title="Animation speed">1×</button>
      <button class="icoBtn" id="btnRules">Rules</button>
      <button class="icoBtn" id="btnQuit">Menu</button>
    </header>

    <div class="pane">
      <h3 id="hPlayers">Players</h3>
      <div id="pls"></div>
    </div>

    <div class="pane">
      <h3 id="hProgram">Your program</h3>
      <div id="hint" class="prompt" style="display:none"></div>
      <div class="slots">
        <div class="slot" id="s0" data-slot="0"><div class="n">SLOT 1</div><div class="a">—</div></div>
        <div class="slot" id="s1" data-slot="1"><div class="n">SLOT 2</div><div class="a">—</div></div>
      </div>
      <div class="acts" id="acts"></div>
      <button id="go" disabled>Commit &amp; resolve</button>
    </div>

    <div class="pane">
      <h3 id="hContracts">Contracts</h3>
      <div id="cts"></div>
    </div>

    <div class="pane" id="legendPane">
      <h3 id="hWater">The water</h3>
      <div class="legend">
        <span><i style="background:var(--water3)"></i><span id="legDeep">deep 3</span></span>
        <span><i style="background:var(--water2)"></i><span id="legMid">2</span></span>
        <span><i style="background:var(--water1)"></i><span id="legShallow">1 — fragile</span></span>
        <span><i style="background:var(--dead);outline:1px dashed #6b4a2c"></i><span id="legDead">silted</span></span>
      </div>
    </div>

    <div class="log" id="log"></div>
  </aside>
</div>

<div id="book">
      <div class="bookCard">
        <div class="bookHead">
          <div>
            <div class="bookTitle" id="bkTitle"></div>
            <div class="bookSub" id="bkSub"></div>
          </div>
          <button class="icoBtn" id="bkClose">Close</button>
        </div>
        <div class="bookBody" id="bkBody"></div>
        <div class="bookFoot">
          <button class="pageBtn" id="bkPrev">‹ Back</button>
          <div class="dots" id="bkDots"></div>
          <button class="pageBtn" id="bkNext">Next ›</button>
        </div>
      </div>
    </div>

<script type="module" src="./ui.js"></script>
</body>
</html>
