<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<title>ANOD — a river delta game</title>
<style>
  :root{
    --bg:#232e28; --panel:#2b3830; --panel2:#26322b; --line:#3e5046; --line2:#57705f;
    --ink:#f4f1e8; --dim:#bcc8bb; --dim2:#93a394;
    --water3:#5fb3a8; --water2:#6f9a7e; --water1:#a99a5e; --dead:#6b4a2c;
    --gold:#f2c56f;
    --p0:#f2c56f; --p1:#79c6d6; --p2:#a8d97a; --p3:#e89a86;
    --timber:#b6d47f; --grain:#f0d97a; --salt:#d8ecea;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}

  /* ---------- menu ---------- */
  /* Menu gets the paper too, so the first thing you see already looks like a
     board game rather than a settings screen. */
  #menu{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
    background:#241d13;isolation:isolate}
  /* Wood table under the menu: the first screen should look like a game being set
     out, not a form. */
  #menu::before{content:'';position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:url('./assets/art/mat-wood.png') center/420px;
    opacity:.5;filter:brightness(.42) saturate(.85)}
  #menu::after{content:'';position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(ellipse 70% 62% at 50% 42%,
      transparent 38%, rgba(20,16,10,.55) 100%)}
  #menu.hide{display:none}
  /* The card is a sheet of paper laid on the table, not the table itself. */
  .menuCard{position:relative;isolation:isolate;width:min(940px,94vw);max-height:92vh;
    overflow-y:auto;padding:30px 40px;border-radius:12px;
    background:#3b3527;border:1px solid rgba(255,238,205,.14);
    box-shadow:0 22px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,240,210,.07)}
  .menuCard::before{content:'';position:absolute;inset:0;z-index:-1;border-radius:12px;
    background:url('./assets/art/art-paper.png') center/cover;
    opacity:.5;filter:brightness(.56) saturate(1.1)}
  /* Two columns so the setup stops being a tall stack of identical rows. Falls
     back to one column when there is not room for two. */
  .setupGrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media (max-width:760px){.setupGrid{grid-template-columns:1fr;gap:0}}
  .setupCol{min-width:0}
  .opponentsBox{background:rgba(18,14,9,.28);border:1px solid rgba(255,238,205,.1);
    border-radius:9px;padding:13px 14px;box-shadow:inset 0 2px 6px rgba(0,0,0,.25)}
  .fieldNote{margin:9px 0 0;font-size:11px;color:var(--dim2);line-height:1.45}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:6px}
  .brand svg{width:46px;height:46px;color:var(--gold);flex:none}
  .brand h1{margin:0;font-size:38px;letter-spacing:.28em;font-weight:600}
  .tag{color:var(--dim);margin:0 0 20px;font-size:14.5px;line-height:1.5}
  .tag b{color:var(--ink);font-weight:500}
  .fieldset{margin-bottom:16px}
  .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
    margin-bottom:7px;font-weight:600}
  .opts{display:flex;gap:8px;flex-wrap:wrap}
  /* Setup options are small tiles you pick, so they get the same card stock as the
     action cards rather than a cold form-control fill. */
  .opt{position:relative;isolation:isolate;overflow:hidden;
    flex:1;min-width:86px;padding:10px 8px;border:1px solid #6b5c3f;border-radius:8px;
    background:#3a2f22;cursor:pointer;text-align:center;color:var(--ink);font:inherit;
    transition:transform .12s,box-shadow .12s,border-color .12s;
    box-shadow:0 2px 0 rgba(20,16,10,.45), inset 0 1px 0 rgba(255,240,210,.06)}
  .opt::before{content:'';position:absolute;inset:0;z-index:-1;
    background:url('./assets/art/mat-leather.png') center/150px;
    opacity:.5;filter:brightness(.62) saturate(.9)}
  .opt:hover{border-color:var(--gold);transform:translateY(-1px);
    box-shadow:0 3px 0 rgba(20,16,10,.45), 0 6px 14px rgba(0,0,0,.3)}
  .opt.on{border-color:var(--gold);
    box-shadow:0 2px 0 rgba(20,16,10,.45), inset 0 0 0 1px rgba(242,197,111,.4),
      0 0 16px color-mix(in srgb,var(--gold) 22%,transparent)}
  .opt.on::before{opacity:.42;filter:brightness(.85) saturate(1) sepia(.25)}
  .opt .k{font-weight:600;font-size:14px}
  .opt .v{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.35}
  .botRow{position:relative;isolation:isolate;overflow:hidden;
    padding:10px 11px;border:1px solid #6b5c3f;border-radius:8px;
    background:#33291d;margin-bottom:7px;
    box-shadow:inset 0 1px 0 rgba(255,240,210,.05)}
  .botRow::before{content:'';position:absolute;inset:0;z-index:-1;
    background:url('./assets/art/mat-leather.png') center/170px;
    opacity:.42;filter:brightness(.55) saturate(.85)}
  .botTop{display:flex;align-items:center;gap:9px}
  .botRow .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .botRow select{flex:1;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:5px;padding:7px 8px;font:inherit;font-weight:600;cursor:pointer}
  .botRow select:focus{outline:none;border-color:var(--gold)}
  /* Full width on its own line — squeezed into a 150px right-aligned column it
     was simply truncated, so the one thing that distinguishes the opponents was
     unreadable. */
  .botRow .desc{display:block;margin-top:6px;font-size:11.5px;color:var(--dim2);
    line-height:1.45}
  .go{display:flex;gap:10px;margin-top:20px;align-items:stretch}
  /* Both primary buttons carry a subtitle. "Play" and "Guided first game" gave a
     newcomer no basis to choose, and the guided one is almost always the right
     answer for a first visit — so it leads. */
  .btnBig,.btnGhost{display:flex;flex-direction:column;align-items:center;gap:2px}
  .btnBig .bt,.btnGhost .bt{font-weight:700;font-size:15px;letter-spacing:.03em}
  .btnBig .bs,.btnGhost .bs{font-size:10.5px;font-weight:500;letter-spacing:.04em;opacity:.72;
    text-transform:none}
  .btnBig{flex:1;padding:12px 13px;border-radius:8px;border:1px solid var(--gold);
    background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 92%,#fff 8%),var(--gold));
    color:#2a2113;font:inherit;cursor:pointer;transition:.13s;
    box-shadow:0 2px 0 color-mix(in srgb,var(--gold) 55%,#000 45%),
    0 5px 16px color-mix(in srgb,var(--gold) 24%,transparent)}
  .btnBig:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .btnBig:active{transform:translateY(1px)}
  .btnGhost{flex:1;padding:12px 13px;border-radius:8px;border:1px solid var(--line2);
    background:transparent;color:var(--ink);font:inherit;font-weight:600;font-size:15px;
    cursor:pointer;transition:.13s}
  .btnGhost:hover{background:color-mix(in srgb,var(--panel) 80%,var(--ink) 6%);border-color:var(--gold);color:var(--gold)}
  /* No subtitle on this one, so centre it against the taller two. */
  .btnNarrow{flex:0 0 auto;padding-left:22px;padding-right:22px;justify-content:center}
  #gloss{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  #gloss summary{cursor:pointer;color:var(--dim);font-size:12px;letter-spacing:.06em;
    list-style:none;user-select:none}
  #gloss summary::-webkit-details-marker{display:none}
  #gloss summary::before{content:'▸ ';color:var(--gold)}
  #gloss[open] summary::before{content:'▾ '}
  #gloss summary:hover{color:var(--ink)}
  .glossBody{margin-top:12px;font-size:12.5px;line-height:1.6;color:var(--dim)}
  .glossBody h5{margin:12px 0 5px;font-size:10px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--dim2);font-weight:600}
  .glossBody dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:3px 12px}
  .glossBody dt{color:var(--gold);font-weight:600;white-space:nowrap}
  .glossBody dd{margin:0}
  .glossBody p{margin:10px 0 0;font-size:12px;line-height:1.6}


  /* short viewports: the menu must fit without scrolling */
  @media (max-height: 860px) {
    .menuCard{padding:20px 34px}
    .brand{margin-bottom:4px}
    .brand h1{font-size:32px}
    .brand svg{width:38px;height:38px}
    .tag{font-size:13.5px;margin-bottom:16px;line-height:1.45}
    .fieldset{margin-bottom:13px}
    .opt{padding:8px}
    .opt .v{font-size:10px}
    .botRow{padding:5px 9px;margin-bottom:5px}
    .go{margin-top:14px}
    .btnBig,.btnGhost{padding:11px;font-size:14px}
    #gloss{display:none!important}
  }
  @media (max-height: 700px) {
    .menuCard{padding:16px 30px}
    .brand h1{font-size:27px}
    .brand svg{width:32px;height:32px}
    .tag{font-size:12.5px;margin-bottom:12px}
    .fieldset{margin-bottom:10px}
    .lbl{margin-bottom:5px}
    .opt{padding:7px}
    .opt .v{display:none}
    .botRow .desc{display:none}
  }

  /* ---------- game ---------- */
  /* Column: board+sidebar row on top, action bar beneath at full width. */
  #game{display:flex;flex-direction:column;height:100vh}
  #top{display:flex;flex:1;min-height:0}

  /* ---------- action bar ---------- */
  #bar{flex:0 0 auto;display:flex;align-items:stretch;gap:14px;
    padding:11px 16px;background:var(--panel);border-top:1px solid var(--line);
    box-shadow:0 -6px 20px rgba(0,0,0,.22)}
  .barLead{flex:0 0 auto;display:flex;flex-direction:column;gap:5px}
  .barLead h3{margin:0;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);font-weight:600}
  /* Persistent order/timing reminder. Muted so it reads as a standing note, not a
     prompt; the "after both" clause is warm-tinted because that is the part that
     surprises people. Hidden once the board takes over for aiming. */
  .orderHint{font-size:10.5px;line-height:1.35;color:var(--dim2);max-width:230px}
  .orderHint b{color:var(--warn);font-weight:600}
  .orderHint.hide{display:none}
  .barSlots{display:flex;gap:9px;flex:0 0 auto}
  .barSlots .slot{width:104px;height:62px}
  /* The four actions get the width they were starved of in a 352px column. */
  #bar .acts{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:9px;min-width:0}
  #bar .act{height:100%;align-items:center}
  .barGo{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;
    align-items:stretch;gap:5px;min-width:196px;position:relative}
  .barGo .stepHint{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--gold);text-align:center}
  .barGo #go{margin-top:0}
  /* The target prompt floats above the bar so it cannot resize it mid-round. */
  .barGo .prompt{position:absolute;bottom:calc(100% + 9px);right:0;width:290px;
    margin-bottom:0;z-index:5}

  @media (max-width:1100px){
    .barSlots .slot{width:78px;height:56px}
    .barGo{min-width:150px}
    #bar .act .d{display:none}
  }
  #game.hide{display:none}
  /* Aged-paper surface under the delta. This is the change that answers "why is it
     so gloomy" — a warm textured ground rather than flat near-black. The texture is
     held well back (low opacity, darkened via multiply) so it reads as a surface the
     board sits ON and never competes with the channels drawn over it. */
  #board{flex:1;position:relative;min-width:0;isolation:isolate}
  /* A warm ground colour first, then the paper grain on top of it. The texture is
     a light scan, so 'luminosity' blending stripped every bit of warmth out and
     left the board exactly as dark as before — the opposite of the point. Tinting
     underneath and letting the grain modulate it keeps the warmth. */
  /* Commit to the parchment. Earlier attempts kept the texture at low opacity over
     a dark ground, which produced a faint olive tint and left the board as dark as
     it started — timid, and it dodged the actual complaint. The paper is now the
     ground itself, darkened just enough that light channel strokes and white labels
     still clear contrast over it. */
  #board{background:#41392b}
  #board::before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background:url('./assets/art/art-paper.png') center/cover no-repeat;
    opacity:.55;filter:brightness(.62) saturate(1.15) contrast(1.02)}
  /* Vignette: pulls the eye to the delta and keeps the edge labels off a bright field. */
  #board::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 78% 72% at 50% 46%,
      transparent 42%, rgba(24,20,14,.42) 100%)}
  #svg{position:relative;z-index:1}
  #svg{width:100%;height:100%;display:block}
  /* Effects overlay sits exactly on the board and never intercepts a click. */
  #fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}

  /* Who is acting right now. */
  #actor{position:absolute;top:10px;left:50%;transform:translateX(-50%) translateY(-6px);
    z-index:3;pointer-events:none;opacity:0;transition:opacity .16s,transform .16s;
    font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;
    padding:5px 13px;border-radius:999px;background:color-mix(in srgb,var(--bg) 82%,transparent);
    border:1px solid var(--line);backdrop-filter:blur(3px);white-space:nowrap}
  #actor.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .icoBtn.muted{opacity:.5}

  /* Pan/zoom controls, bottom-left of the board so they never sit under the
     actor badge or a floating prompt. */
  #zoomBar{position:absolute;left:12px;bottom:12px;z-index:4;display:flex;
    flex-direction:column;gap:5px}
  /* Aiming prompt / build confirm bar, floated over the board bottom-RIGHT: out of
     the delta's centre so it hides as little map as possible, and clear of the zoom
     controls at bottom-left. The board can still be panned out from under it, so no
     target is ever trapped behind it. Slightly translucent for the same reason. */
  #board #hint.prompt{position:absolute;right:14px;bottom:14px;
    z-index:5;width:min(290px,calc(100% - 120px));margin:0;
    background:color-mix(in srgb,var(--panel) 92%,var(--gold) 8%);opacity:.96;
    backdrop-filter:blur(4px);
    box-shadow:0 8px 26px rgba(0,0,0,.5),0 0 0 1px rgba(255,238,205,.08)}
  .zoomBtn{width:31px;height:31px;border-radius:7px;border:1px solid var(--line2);
    background:color-mix(in srgb,var(--bg) 84%,transparent);color:var(--ink);
    font:inherit;font-size:15px;line-height:1;cursor:pointer;backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;transition:.12s}
  .zoomBtn:hover{border-color:var(--gold);color:var(--gold)}
  /* Grab cursor on the board itself, so it reads as draggable. */
  #svg{cursor:grab}
  #svg.dragging{cursor:grabbing}
  #svg.aiming{cursor:crosshair}

  /* Hover help. Fixed-position so it can escape the sidebar's overflow:hidden —
     inside it, a tooltip would be clipped at the panel edge. */
  #tip{position:fixed;z-index:90;max-width:290px;pointer-events:none;
    background:color-mix(in srgb,var(--panel) 94%,#000 6%);
    border:1px solid var(--line2);border-radius:8px;padding:10px 12px;
    box-shadow:0 8px 26px rgba(0,0,0,.45);opacity:0;transform:translateY(3px);
    transition:opacity .13s,transform .13s;font-size:12px;line-height:1.5;
    color:var(--dim)}
  #tip.on{opacity:1;transform:translateY(0)}
  #tip b{display:block;color:var(--gold);font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:5px;font-weight:600}
  /* No hover on touch: the tooltip would fire on tap and cover what you tapped. */
  @media (pointer:coarse){#tip{display:none}}

  /* ---- effect animations -------------------------------------------------
     Every effect is a one-shot that removes itself. Keep durations under ~1s:
     these fire several times per round and a slow effect becomes a wait. */
  #fx text{font:600 3.1px ui-sans-serif,system-ui,sans-serif;paint-order:stroke;
    stroke:var(--bg);stroke-width:.7px;stroke-linejoin:round}
  .fxFloat{animation:fxFloat 1.25s ease-out forwards;opacity:0}
  @keyframes fxFloat{
    0%{opacity:0;transform:translateY(1.2px)}
    18%{opacity:1}
    70%{opacity:1}
    100%{opacity:0;transform:translateY(-3.4px)}}
  .fxCoin{fill:var(--gold)}
  .fxVp{fill:var(--good);font-size:3.6px}
  .fxToll{fill:var(--warn)}
  .fxSpend{fill:var(--dim2)}
  .fxBad{fill:var(--bad)}
  .fxGood{fill:var(--good)}

  /* A boat actually travelling the route — the difference between "this path is
     highlighted" and "a shipment is happening". */
  .fxBoat{animation:fxBoatIn .18s ease-out}
  @keyframes fxBoatIn{from{opacity:0}to{opacity:1}}
  /* Wake trailing the boat, drawn with a dash offset so it wipes on. */
  .fxWake{animation:fxWake .26s ease-out forwards;opacity:0;
    stroke-dasharray:24;stroke-dashoffset:24}
  @keyframes fxWake{
    0%{opacity:0;stroke-dashoffset:24}
    30%{opacity:.85}
    100%{opacity:0;stroke-dashoffset:0}}

  .fxDredge{animation:fxDredge .8s ease-out forwards;opacity:0}
  @keyframes fxDredge{0%{opacity:0}25%{opacity:.9}100%{opacity:0}}

  /* Silting: a slow choke, not a flash. Reads as the water giving up. */
  .fxSilt{animation:fxSilt .95s ease-in forwards;opacity:0}
  @keyframes fxSilt{0%{opacity:0}35%{opacity:.75}100%{opacity:0}}
  .fxDie{animation:fxDie 1s ease-in forwards;opacity:0}
  @keyframes fxDie{
    0%{opacity:0}20%{opacity:1}55%{opacity:.9}100%{opacity:0}}

  .fxBlock{animation:fxBlock .9s ease-out forwards;opacity:0}
  @keyframes fxBlock{
    0%,42%{opacity:0}12%,28%{opacity:1}100%{opacity:0}}

  .fxRing{animation:fxRing .85s ease-out forwards;opacity:0;
    transform-box:fill-box;transform-origin:center}
  @keyframes fxRing{
    0%{opacity:.95;transform:scale(.55)}
    100%{opacity:0;transform:scale(1.7)}}
  .fxFade{animation:fxFade .85s ease-out forwards}
  @keyframes fxFade{0%{opacity:.9}100%{opacity:0}}

  /* Motion sensitivity: effects still convey information, just without travel.
     Turning them off entirely would remove the feedback the user asked for. */
  @media (prefers-reduced-motion:reduce){
    .fxFloat{animation-duration:.9s}
    .fxWake,.fxBoat{display:none}
    .fxDredge,.fxSilt,.fxDie,.fxBlock,.fxRing,.fxFade{animation-duration:.5s}
  }
  /* The sidebar carried a flat dark fill next to a warm textured board, which is
     why the UI still read cold even after the board was fixed. Same paper, held
     further back so it never competes with the text over it. */
  aside{position:relative;isolation:isolate;width:352px;background:#2b2318;
    border-left:1px solid rgba(255,235,195,.12);
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:inset 1px 0 0 rgba(255,235,195,.05)}
  aside::before{content:'';position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:url('./assets/art/mat-wood.png') center/300px;
    opacity:.44;filter:brightness(.4) saturate(.85)}
  /* The bar is part of the same surface. */
  /* The bar is the wooden edge of the table the cards rest on. */
  #bar{position:relative;isolation:isolate;background:#2b2318}
  #bar::before{content:'';position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:url('./assets/art/mat-wood.png') center/300px;
    opacity:.5;filter:brightness(.42) saturate(.85)}
  /* A lit top edge, the way a raised wooden rail catches light. */
  #bar{border-top:1px solid rgba(255,235,195,.14);
    box-shadow:0 -6px 20px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,235,195,.06)}
  header{padding:12px 15px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;gap:10px}
  header svg{width:22px;height:22px;color:var(--gold);flex:none}
  header .t{flex:1}
  header h2{margin:0;font-size:14px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  header .sub{color:var(--dim);font-size:12px;margin-top:2px}
  .icoBtn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:5px;
    padding:5px 9px;cursor:pointer;font:inherit;font-size:11px}
  .icoBtn:hover{color:var(--ink);border-color:var(--line2)}
  .pane{padding:11px 15px;border-bottom:1px solid var(--line)}
  .pane h3{margin:0;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);font-weight:600}
  .paneHead{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .paneHead .count,.paneHead .stepHint{margin-left:auto;font-size:10px;color:var(--dim2);
    letter-spacing:.08em}

  /* The panel you act on every round. Given a lifted surface and a gold spine so
     the eye lands here first — previously it was the third of five identical
     boxes and nothing said "this is the part you use". */
  .pane.primary{background:color-mix(in srgb,var(--panel) 86%,var(--gold) 5%);
    border-left:2px solid var(--gold);padding-top:13px;padding-bottom:14px}
  .pane.primary h3{color:var(--ink)}
  .pane.primary .stepHint{color:var(--gold)}

  /* Legend collapses: it teaches the depth colours once, then holds permanent
     space for information you already know. */
  details#legendPane{padding:0}
  details#legendPane>summary{padding:10px 15px;cursor:pointer;list-style:none;
    display:flex;align-items:center;gap:7px}
  details#legendPane>summary::-webkit-details-marker{display:none}
  details#legendPane>summary::before{content:'▸';color:var(--gold);font-size:10px;
    transition:transform .15s}
  details#legendPane[open]>summary::before{transform:rotate(90deg)}
  details#legendPane>summary:hover h3{color:var(--ink)}
  details#legendPane .legend{padding:0 15px 12px}
  .pl{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;
    background:var(--panel2);border:1px solid transparent;font-size:13px;margin-bottom:5px}
  .pl.me{border-color:var(--line2)}
  .pl .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .pl .nm{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Revealed program. Two face-down slots that flip to the committed actions —
     in a game with no hidden information, what everyone played should be legible
     at a glance rather than buried in the log. */
  .pl .prog{display:flex;gap:3px;flex:none;cursor:help}
  .pl .pslot{width:22px;height:22px;border-radius:5px;border:1px dashed var(--line2);
    background:color-mix(in srgb,var(--bg) 45%,transparent);
    display:flex;align-items:center;justify-content:center;opacity:.5}
  .pl .pslot.on{border-style:solid;opacity:1;
    background:color-mix(in srgb,var(--panel) 70%,var(--ink) 5%)}
  .pl .pico{width:15px;height:15px;color:var(--dim);object-fit:contain}
  .pl .pslot.on .pico{color:var(--ink)}
  /* Labelled stats instead of "8g · 1b · 0✓". The number stays prominent; the
     unit sits under it in small caps so the row is scannable without a key. */
  .pl .st{display:flex;gap:11px;flex:none;font-variant-numeric:tabular-nums}
  .pl .st b{display:flex;flex-direction:column;align-items:center;line-height:1.05;
    font-weight:600;font-size:13px;color:var(--ink);cursor:help}
  .pl .st b i{font-style:normal;font-size:8.5px;letter-spacing:.07em;color:var(--dim2);
    text-transform:uppercase;font-weight:500;margin-top:2px}
  .slots{display:flex;gap:8px;margin-bottom:9px}
  /* Slots are wells the cards drop into: recessed rather than raised, so an empty
     slot reads as a space waiting to be filled instead of another button. */
  .slot{flex:1;height:56px;border:1px dashed rgba(255,238,205,.22);border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    cursor:pointer;background:rgba(18,14,9,.34);transition:.13s;
    box-shadow:inset 0 2px 5px rgba(0,0,0,.35)}
  .slot:hover{border-color:rgba(255,238,205,.4)}
  .slot.on{border-style:solid;border-color:var(--gold);
    background:color-mix(in srgb,rgba(18,14,9,.3) 70%,var(--gold) 12%);
    box-shadow:inset 0 2px 5px rgba(0,0,0,.3), 0 0 0 2px color-mix(in srgb,var(--gold) 30%,transparent)}
  /* A filled slot holds a card, so it stops looking recessed. */
  .slot.filled{border-style:solid;border-color:#6b5c3f;background:#3a3427;
    box-shadow:0 2px 0 rgba(20,16,10,.45), inset 0 1px 0 rgba(255,240,210,.06)}
  /* Aim has to survive being filled — this is the rule that tells you which of two
     identical-looking cards your next pick is about to overwrite. */
  .slot.filled.on{border-color:var(--gold);
    box-shadow:0 2px 0 rgba(20,16,10,.45), 0 0 0 2px color-mix(in srgb,var(--gold) 42%,transparent)}
  .slot{position:relative}
  .slot .clr{position:absolute;top:2px;right:2px;width:20px;height:20px;padding:0;
    border:0;border-radius:5px;background:transparent;color:var(--dim2);
    font-size:15px;line-height:1;cursor:pointer;opacity:0;transition:.12s}
  .slot:hover .clr,.slot .clr:focus-visible{opacity:1}
  .slot .clr:hover{background:rgba(190,70,55,.28);color:#ffd9d2}
  .slot svg{width:19px;height:19px;color:var(--gold)}
  .slot img.art{width:26px;height:26px;object-fit:contain}
  .slot .n{font-size:9px;color:var(--dim2);letter-spacing:.12em}
  .slot .a{font-weight:600;font-size:12px;text-transform:capitalize}
  .slot .g{font-size:9px;color:var(--dim2);text-transform:lowercase;margin-top:-1px}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  /* Action cards, not form buttons. These are the pieces you pick up every round,
     so they get card stock: warm paper, a printed edge, and a lift on hover. Flat
     rounded rectangles read as a settings dialog no matter what art is on them. */
  .act{position:relative;isolation:isolate;overflow:hidden;
    display:flex;gap:9px;align-items:flex-start;padding:10px 11px;border-radius:8px;
    border:1px solid #6b5c3f;background:#3a3427;color:var(--ink);font:inherit;
    cursor:pointer;text-align:left;transition:transform .13s,box-shadow .13s,border-color .13s;
    box-shadow:0 2px 0 rgba(20,16,10,.5), 0 4px 10px rgba(0,0,0,.28),
      inset 0 1px 0 rgba(255,240,210,.07)}
  /* Paper grain on every card. */
  /* Leather, not paper. Cards you handle every round should feel like a different
     material from the map they sit under — one texture everywhere is most of why
     the UI still read flat after the board was fixed. */
  .act::before{content:'';position:absolute;inset:0;z-index:-1;
    background:#3a2f22 url('./assets/art/mat-leather.png') center/180px;
    opacity:.62;filter:brightness(.6) saturate(.9)}
  /* A hairline inner rule, the way a printed card has a border inside its edge. */
  .act::after{content:'';position:absolute;inset:3px;border-radius:5px;
    border:1px solid rgba(255,238,205,.055);pointer-events:none}
  .act:hover:not(:disabled){transform:translateY(-2px);border-color:var(--gold);
    box-shadow:0 4px 0 rgba(20,16,10,.5), 0 9px 20px rgba(0,0,0,.34),
      inset 0 1px 0 rgba(255,240,210,.1)}
  .act:active:not(:disabled){transform:translateY(0);
    box-shadow:0 1px 0 rgba(20,16,10,.5), 0 2px 6px rgba(0,0,0,.3)}
  .act:disabled{opacity:.35;cursor:not-allowed}
  /* Dimmed rather than merely disabled: during a guided step the one action being
     taught should be the only thing that looks alive. */
  .act.dimmed{opacity:.22}
  .act svg{width:17px;height:17px;color:var(--gold);flex:none;margin-top:1px}
  /* Painted art sits where an SVG glyph would. Sized a little larger because the
     art has its own internal margin that a glyph does not. */
  .act img.art{width:23px;height:23px;flex:none;margin-top:-1px;object-fit:contain}
  img.art{object-fit:contain;user-select:none;-webkit-user-drag:none}
  .act .txt{display:flex;flex-direction:column;min-width:0}
  .act .t{font-weight:600;text-transform:capitalize;font-size:13px;line-height:1.2}
  .act .t em{font-style:normal;font-weight:400;color:var(--dim2);font-size:10px;
    text-transform:lowercase;margin-left:5px}
  .act .d{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.35}
  /* Where this pick lands. Quiet until it turns destructive — a plan you are about
     to overwrite is worth more than 9px of grey. */
  .act .dest{position:absolute;top:4px;right:6px;font-size:8.5px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--dim2);opacity:.75}
  .act .dest{pointer-events:none}
  .act .dest.warn{color:#e8a87c;opacity:1}
  /* The one control pressed every round. Sized and lit to look like the primary
     action rather than another item in a list. */
  #go{width:100%;margin-top:11px;padding:13px;border-radius:7px;border:1px solid var(--gold);
    background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 92%,#fff 8%),var(--gold));
    color:#2a2113;font:inherit;font-weight:700;cursor:pointer;font-size:14px;
    letter-spacing:.04em;box-shadow:0 2px 0 color-mix(in srgb,var(--gold) 55%,#000 45%),
    0 4px 14px color-mix(in srgb,var(--gold) 26%,transparent);transition:.12s}
  #go:hover:not(:disabled){filter:brightness(1.06);transform:translateY(-1px);
    box-shadow:0 3px 0 color-mix(in srgb,var(--gold) 55%,#000 45%),
    0 6px 18px color-mix(in srgb,var(--gold) 32%,transparent)}
  #go:active:not(:disabled){transform:translateY(1px);
    box-shadow:0 1px 0 color-mix(in srgb,var(--gold) 55%,#000 45%)}
  #go:disabled{background:var(--panel2);color:var(--dim2);border-color:var(--line);
    cursor:not-allowed;box-shadow:none}
  .prompt{background:color-mix(in srgb,var(--panel) 70%,var(--gold) 12%);border:1px solid var(--gold);border-radius:6px;padding:9px 10px;
    font-size:12px;margin-bottom:9px;color:var(--ink);line-height:1.4}
  /* The way out of aiming. Understated — it is an escape hatch, not the thing we
     want you to press — but always present, because aiming traps input. */
  .skipAim{display:block;margin-top:7px;padding:5px 9px;min-height:28px;
    border:1px solid rgba(255,238,205,.28);border-radius:5px;
    background:rgba(18,14,9,.3);color:var(--dim);font-size:11px;
    font-family:inherit;cursor:pointer;transition:.12s}
  .skipAim:hover{border-color:var(--gold);color:var(--ink)}
  .skipAim kbd{font-family:inherit;font-size:9.5px;opacity:.7;
    border:1px solid currentColor;border-radius:3px;padding:0 3px;margin-left:4px}
  /* Confirm: the primary action of the confirm bar, so it reads as the button we
     DO want you to press — solid gold, unlike the understated Skip/Pick-another. */
  .confirmTxt{display:block;margin-bottom:7px}
  .confirmTxt b{color:var(--gold)}
  .confirmYes{display:block;width:100%;margin-top:7px;padding:6px 9px;min-height:30px;
    border:1px solid var(--gold);border-radius:5px;font-family:inherit;font-size:12px;
    font-weight:600;background:color-mix(in srgb,var(--gold) 22%,var(--panel));
    color:var(--ink);cursor:pointer;transition:.12s}
  .confirmYes:hover{background:color-mix(in srgb,var(--gold) 34%,var(--panel))}
  .ct{font-size:12px;padding:7px 0;border-bottom:1px solid var(--line);color:var(--dim);
    display:flex;gap:9px;align-items:flex-start;cursor:help;line-height:1.45}
  .ct:last-child{border-bottom:none}
  .ct.empty{cursor:default;color:var(--dim2);font-style:italic}
  /* Points get a chip: it is the number you compare contracts by. */
  .ct .vp{color:var(--gold);font-weight:700;flex:none;font-variant-numeric:tabular-nums;
    background:color-mix(in srgb,var(--gold) 15%,transparent);border-radius:5px;
    padding:2px 7px;font-size:12.5px;min-width:30px;text-align:center}
  .ct .cbody b{color:var(--ink);font-weight:600}
  /* Claimed-channels list: the dredging-rights tug-of-war. Each row is a channel,
     with a stack of marker pips per contesting player. Reads like tokens on a
     board, no numbers to parse. */
  .claim{font-size:12px;padding:6px 0;border-bottom:1px solid var(--line);color:var(--dim);
    display:flex;align-items:center;gap:8px;cursor:help}
  .claim:last-child{border-bottom:none}
  .claim.empty{cursor:default;color:var(--dim2);font-style:italic}
  .claim.mine{color:var(--ink)}
  .claim .claimEnds{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-variant-numeric:tabular-nums}
  .claim .claimMarks{display:flex;align-items:center;gap:5px;flex:none}
  .claim .stack{display:inline-flex;gap:2px}
  .claim .pip{width:7px;height:9px;border-radius:2px;
    box-shadow:0 0 0 1px rgba(20,16,10,.5) inset}
  .claim .vs{font-size:9px;color:var(--dim2);letter-spacing:.05em}
  /* A channel one dredge from flipping: flag it, and glow if it's contestable. */
  .claim.hot .claimHot{font-size:8.5px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--warn);flex:none}
  .claim.hot{color:var(--ink)}
  .log{flex:1;overflow-y:auto;padding:9px 15px;font-size:12px;line-height:1.55}
  .log div{color:var(--dim);padding:1px 0}
  .log div.hd{color:var(--ink);font-weight:600;margin-top:7px;border-top:1px solid var(--line);
    padding-top:6px}
  .log div.me{color:var(--gold)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
  .legend i{display:inline-block;width:16px;height:3px;border-radius:2px;margin-right:5px;
    vertical-align:middle}

  /* ---------- overlays ---------- */
  #ov{position:absolute;inset:0;background:color-mix(in srgb,var(--bg) 94%,transparent);display:none;
    align-items:center;justify-content:center;z-index:20}
  #ov.on{display:flex}
  /* Survey picker — lives in the sidebar above the contract hand, board stays
     visible so you choose in context. Not a modal: the choice depends on where
     your settlements are and which bays you can reach, which a dimmed board
     would hide. A gold frame + gentle pulse mark it as the thing to act on. */
  #survey{display:none;margin-bottom:12px}
  #survey.on{display:block;animation:surveyIn .18s ease-out}
  @keyframes surveyIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .surveyHead{font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin-bottom:8px;
    display:flex;align-items:center;gap:6px}
  .surveyHead::before{content:'▸';color:var(--gold)}
  .surveyCards{display:flex;flex-direction:column;gap:7px;
    padding:9px;border:1px solid var(--gold);border-radius:9px;
    background:color-mix(in srgb,var(--panel) 82%,var(--gold) 8%);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 14%,transparent)}
  .surveyCard{position:relative;isolation:isolate;overflow:hidden;
    display:flex;gap:9px;align-items:flex-start;padding:9px 10px;
    border:1px solid #6b5c3f;border-radius:7px;background:#3a2f22;cursor:pointer;
    color:var(--ink);font:inherit;text-align:left;transition:transform .1s,border-color .1s;
    box-shadow:0 2px 0 rgba(20,16,10,.4)}
  .surveyCard::before{content:'';position:absolute;inset:0;z-index:-1;
    background:url('./assets/art/mat-leather.png') center/150px;
    opacity:.5;filter:brightness(.62) saturate(.9)}
  .surveyCard:hover{border-color:var(--gold);transform:translateX(2px)}
  .surveyCard .vp{color:var(--gold);font-weight:700;font-size:16px;flex:none;
    font-variant-numeric:tabular-nums;min-width:26px;text-align:center}
  .surveyCard .cbody{font-size:12px;line-height:1.45;color:var(--dim)}
  .surveyCard .cbody b{color:var(--ink)}
  .surveySkip{margin-top:8px;width:100%;padding:6px;border:1px solid var(--line2);
    border-radius:6px;background:rgba(18,14,9,.3);color:var(--dim);font:inherit;
    font-size:11px;cursor:pointer;transition:.12s}
  .surveySkip:hover{border-color:var(--gold);color:var(--ink)}
  .surveySkip kbd{font-family:inherit;font-size:9.5px;opacity:.7;
    border:1px solid currentColor;border-radius:3px;padding:0 3px;margin-left:4px}
  .card{background:var(--panel);border:1px solid var(--line2);border-radius:10px;
    padding:24px 28px;min-width:430px;max-width:90%}
  .card h2{margin:0 0 15px;font-size:16px;letter-spacing:.12em;text-transform:uppercase}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th,td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  tr.win td{color:var(--gold);font-weight:700}
  .card .go{margin-top:18px}

  #tut{position:absolute;left:22px;top:22px;width:340px;z-index:30;
    background:var(--panel);border:1px solid var(--gold);border-radius:10px;padding:16px 18px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);display:none}
  #tut.on{display:block}
  #tut .step{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    font-weight:700;margin-bottom:6px}
  #tut h4{margin:0 0 7px;font-size:15px;font-weight:600}
  #tut p{margin:0 0 13px;color:var(--dim);font-size:12.5px;line-height:1.5}
  #tut .row{display:flex;gap:8px;align-items:center}
  #tut button{padding:8px 14px;border-radius:6px;font:inherit;font-size:12px;cursor:pointer;
    font-weight:600}
  #tutNext{background:var(--gold);border:1px solid var(--gold);color:var(--bg)}
  #tutSkip,#tutSkipStep,#tutSpeak{background:transparent;border:1px solid var(--line2);color:var(--dim)}
  #tutSkipStep:hover,#tutSkip:hover,#tutSpeak:hover{color:var(--ink);border-color:var(--gold)}
  #tutSpeak[aria-pressed="true"]{color:var(--gold);border-color:var(--gold)}
  #tutSkip:hover{color:var(--ink)}
  #tut .wait{font-size:11px;color:var(--gold);opacity:.9;flex:1;line-height:1.35}
  #tut .row{flex-wrap:wrap}

  /* Watch mode. The tutorial box sits top-left because it points AT things —
     a step highlighting the action panel must not cover it. The demo points at
     nothing; it narrates. So it moves to the bottom centre where subtitles
     belong, and widens, because these are sentences rather than instructions. */
  #tut.watching{left:50%;right:auto;top:auto;bottom:20px;transform:translateX(-50%);
    width:min(560px,calc(100% - 40px));text-align:left;
    background:color-mix(in srgb,var(--panel) 92%,transparent);
    backdrop-filter:blur(6px)}
  #tut.watching .step{color:var(--dim2)}
  #tut.watching h4{font-size:16px}
  #tut.watching p{margin-bottom:11px}
  /* The kicker names the beat ("A channel just died") and carries the emphasis
     in this mode, so it leads the row rather than trailing it as a hint. */
  #tut.watching .wait{order:-1;flex:0 0 100%;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;font-size:10px;margin-bottom:2px}


  /* ---------- rulebook ---------- */
  #book{position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 96%,transparent);display:none;
    align-items:center;justify-content:center;z-index:80;padding:20px}
  #book.on{display:flex}
  /* The book sits on the same aged paper as the board, so it reads as part of the
     game rather than a settings dialog dropped on top of it. */
  .bookCard{position:relative;isolation:isolate;background:#3d3629;
    border:1px solid var(--line2);border-radius:12px;
    width:min(660px,100%);max-height:88vh;display:flex;flex-direction:column;
    box-shadow:0 24px 70px rgba(0,0,0,.6)}
  .bookCard::before{content:'';position:absolute;inset:0;z-index:-1;border-radius:12px;
    background:url('./assets/art/art-paper.png') center/cover;
    opacity:.5;filter:brightness(.5) saturate(1.1)}
  .bookHead{display:flex;align-items:flex-start;gap:12px;padding:20px 24px 14px;
    border-bottom:1px solid var(--line)}
  .bookHead>div{flex:1}
  .bookTitle{font-size:20px;font-weight:600;letter-spacing:.02em}
  .bookSub{color:var(--dim);font-size:12px;margin-top:3px}
  .bookBody{padding:18px 24px;overflow-y:auto;flex:1;font-size:13.5px;line-height:1.65;
    color:var(--ink)}
  .bookBody p{margin:0 0 12px;color:var(--dim)}
  .bookBody p b,.bookBody li b,.bookBody dd b{color:var(--ink)}
  .bookBody p.warn{color:var(--ink);background:color-mix(in srgb,var(--panel) 70%,var(--gold) 14%);border-left:2px solid var(--gold);
    padding:9px 12px;border-radius:0 5px 5px 0}
  .bookBody p.tip{color:var(--dim);border-left:2px solid var(--line2);padding:2px 0 2px 12px}
  .bookBody ol,.bookBody ul{margin:0 0 12px;padding-left:20px;color:var(--dim)}
  .bookBody li{margin-bottom:7px}
  .bookBody dl.acts{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;margin:0 0 12px}
  .bookBody dl.acts dt{color:var(--gold);font-weight:600;white-space:nowrap}
  .bookBody dl.acts dt em{display:block;font-style:normal;font-weight:400;font-size:10px;
    color:var(--dim2);text-transform:lowercase}
  .bookBody dl.acts dt.neg{color:var(--p3)}
  .bookBody dl.acts dd{margin:0;color:var(--dim)}
  /* Diagrams. These draw with the same channel curves and water textures as the
     real board, so what the rulebook shows cannot drift from what you play. */
  .bookBody .fig{margin:14px 0 16px;padding:12px 12px 8px;
    background:color-mix(in srgb,#2a2418 62%,transparent);
    border:1px solid var(--line);border-radius:9px}
  .bookBody .fig svg{width:100%;height:auto;display:block}
  .bookBody .fig figcaption{margin-top:9px;font-size:11.5px;line-height:1.5;
    color:var(--dim2);text-align:center;font-style:italic}

  table.depth{border-collapse:collapse;margin:0 0 12px;font-size:13px}
  table.depth td{padding:4px 10px 4px 0;border:none;text-align:left;color:var(--dim)}
  table.depth i{display:inline-block;width:26px;height:5px;border-radius:3px}
  table.depth i.d3{background:var(--water3)} table.depth i.d2{background:var(--water2)}
  table.depth i.d1{background:var(--water1)}
  table.depth i.d0{background:var(--dead);outline:1px dashed #6b4a2c}
  .bookFoot{display:flex;align-items:center;gap:12px;padding:13px 24px;
    border-top:1px solid var(--line)}
  .pageBtn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    border-radius:6px;padding:9px 15px;font:inherit;font-size:13px;cursor:pointer;
    font-weight:600}
  .pageBtn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
  .pageBtn:disabled{opacity:.3;cursor:not-allowed}
  .dots{flex:1;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .dots button{width:8px;height:8px;border-radius:50%;border:none;padding:0;
    background:var(--line2);cursor:pointer;transition:.13s}
  .dots button.on{background:var(--gold);transform:scale(1.3)}
  .dots button:hover{background:var(--dim)}
  @media (max-width: 820px), (pointer: coarse) and (max-width: 1024px){
    #book{padding:0;align-items:stretch}
    .bookCard{width:100%;max-height:100dvh;border-radius:0;border:none}
    .bookHead{padding:16px 18px 12px}
    .bookBody{padding:16px 18px}
    .bookFoot{padding:12px 18px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
    .pageBtn{padding:12px 16px}
    .dots button{width:10px;height:10px}
  }

  /* A glow alone was not enough. The board is dark and already gold-heavy, so an
     animated drop-shadow read as ambient lighting rather than "click this" —
     first-time players missed it entirely. Brightness and scale carry the signal
     now; the glow is just support. */
  .pulse{animation:pulse 1.25s ease-in-out infinite;transform-box:fill-box;
    transform-origin:center}
  @keyframes pulse{
    0%,100%{filter:none;transform:scale(1)}
    50%{filter:drop-shadow(0 0 9px var(--gold)) brightness(1.35);transform:scale(1.09)}}
  /* The expanding ring around a legal target. Purely decorative — it carries no
     pointer events, so it can never intercept the click it is advertising. */
  .beacon{fill:none;stroke:var(--gold);stroke-width:.5;pointer-events:none;
    transform-box:fill-box;transform-origin:center;
    animation:beacon 1.6s ease-out infinite}
  @keyframes beacon{
    0%{transform:scale(.85);opacity:.85}
    100%{transform:scale(1.7);opacity:0}}
  @media (prefers-reduced-motion:reduce){
    .pulse,.beacon{animation:none}
    .beacon{opacity:.6;transform:scale(1.25)}}
  .uiPulse{box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(224,164,88,.45)!important;
    border-radius:7px}
  text{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;user-select:none}
  #svg .empty{opacity:.2}
  .node{cursor:default}

  /* ---------- mobile ----------
     Phones get a stacked layout: board on top, a scrollable control sheet below.
     The log and legend collapse behind a toggle so the action buttons and the
     commit button are always reachable without scrolling. */
  @media (max-width: 820px), (pointer: coarse) and (max-width: 1024px) {
    body{overflow:auto}
    #game{flex-direction:column;height:100dvh}
    /* The board+sidebar row stacks on a phone, and the action bar keeps its own
       band at the bottom where a thumb can reach it. */
    #top{flex-direction:column;flex:1 1 auto;min-height:0}
    #board{flex:0 0 auto;height:46dvh;min-height:240px}
    aside{width:100%;border-left:none;border-top:1px solid var(--line);
      flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
    /* Bar wraps: slots and commit on one line, the four actions below. */
    #bar{flex-wrap:wrap;gap:9px;padding:9px 11px;
      padding-bottom:max(9px,env(safe-area-inset-bottom))}
    /* min-width:0 on every flex child. Without it the slots and the commit button
       refuse to shrink below their content and push the page into horizontal
       scroll on a phone. */
    .barLead,.barSlots,.barGo,#bar .acts{min-width:0}
    /* Two columns, not four. Four action buttons need ~503px of content and a
       phone gives them 368 — the grid could not shrink further, so the overflow
       went to the page instead. */
    #bar .acts{order:3;flex:1 0 100%;grid-template-columns:1fr 1fr;gap:7px}
    /* min-height holds the 44px touch target: trimming padding to fit the width
       had quietly shrunk these below what a thumb can hit reliably. */
    #bar .act{padding:9px 8px;min-height:48px}
    #bar .act .t{font-size:13px}
    .barLead{flex:1 1 auto}
    .barSlots{flex:1 1 auto}
    .barSlots .slot{flex:1;width:auto;min-width:0;height:52px}
    .barGo{flex:1 1 130px;min-width:0}
    .barGo #go{padding:12px 8px;font-size:13px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis}
    .barGo .prompt{position:static;width:auto;margin-bottom:6px}
    /* Zoom buttons need a real tap target on touch. */
    .zoomBtn{width:38px;height:38px;font-size:17px}
    header{position:sticky;top:0;z-index:5;background:var(--panel)}
    .pane{padding:10px 13px}
    /* Players go horizontal to save vertical space. The scroller needs an
       explicit min-width:0 or the labelled stat columns make each row far wider
       than the phone and push the whole PAGE into horizontal scroll instead of
       scrolling inside this strip. */
    #pls{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;min-width:0;
      max-width:100%;-webkit-overflow-scrolling:touch}
    .pl{margin-bottom:0;flex:0 0 auto;font-size:12px;padding:5px 8px}
    .pl .nm{max-width:88px}
    /* Tighter stat columns on a phone: the labels still read, the row halves. */
    .pl .st{gap:7px}
    .pl .st b{font-size:12px}
    .pl .st b i{font-size:7.5px;letter-spacing:.04em}
    .acts{grid-template-columns:1fr 1fr;gap:7px}
    .act{padding:11px 9px}
    .act .t{font-size:14px}
    .slot{height:62px}
    #go{padding:15px;font-size:15px}
    /* bigger tap targets */
    .opt{padding:14px 10px;min-width:0}
    .btnBig,.btnGhost{padding:16px}
    .botRow{flex-wrap:wrap;gap:7px}
    .botRow .desc{width:100%;text-align:left;order:3}
    .botRow select{padding:9px}
    .menuCard{padding:22px 20px}
    .brand h1{font-size:32px;letter-spacing:.22em}
    .brand svg{width:40px;height:40px}
    .tag{font-size:14px;margin-bottom:20px}
    /* collapse the log by default on phones */
    .log{max-height:150px;flex:0 0 auto}
    #legendPane{display:none}
    #legendPane.show{display:block}
    .card{min-width:0;width:calc(100vw - 32px);padding:18px 16px}
    table{font-size:12px}
    th,td{padding:5px 4px}
    #tut{left:10px;right:10px;top:10px;width:auto;padding:13px 15px}
    #tut p{font-size:12px}
    /* Must restate: the rule above is later in the cascade than .watching and
       would otherwise drag the caption back to the top of a phone screen. */
    #tut.watching{left:10px;right:10px;top:auto;bottom:10px;width:auto;transform:none}
  }

  /* very small phones */
  @media (max-width: 340px) {
    .acts{grid-template-columns:1fr}
    .opts{gap:6px}
    .opt .v{font-size:10px}
    #board{height:44dvh}
  }

  /* landscape phone: go back side-by-side, the board is wider than it is tall */
  @media (max-height: 500px) and (orientation: landscape) {
    #game{flex-direction:row}
    #board{flex:1;height:100dvh}
    aside{width:300px;border-top:none;border-left:1px solid var(--line)}
    .log{max-height:none;flex:1 1 auto}
  }

</style>
</head>
<body>

<div id="sprites"></div>

<!-- ================= MENU ================= -->
<div id="menu">
  <div class="menuCard">
    <div class="brand">
      <svg><use href="#ic-river" data-logo/></svg>
      <h1 id="mTitle">ANOD</h1>
    </div>
    <p class="tag" id="mPitch"></p>

    <!-- Two columns: setup on the left, opponents on the right. Four stacked
         fieldsets made a tall thin settings form — every control the same size,
         nothing grouped, and it needed a scrollbar on short screens. -->
    <div class="setupGrid">
      <div class="setupCol">
        <div class="fieldset">
          <div class="lbl">Edition</div>
          <div class="opts" id="themeOpts">
            <button class="opt on" data-theme="anod"
                    data-tip-title="Anód" data-tip="The Pasig delta before Spanish contact. Rival datu, Tagalog vocabulary, real place names from the bay.">
              <div class="k">Anód</div>
              <div class="v">Pasig delta, c. 1400s</div></button>
            <button class="opt" data-theme="silt"
                    data-tip-title="Silt" data-tip="The same game with plain English labels and a generic map.">
              <div class="k">Silt</div>
              <div class="v">plain English</div></button>
          </div>
        </div>

        <div class="fieldset">
          <div class="lbl">Players</div>
          <div class="opts" id="pcOpts">
            <button class="opt" data-pc="2"
                    data-tip="Tighter and more direct — fewer channels get contested, so tolls matter less.">
              <div class="k">2</div><div class="v">duel</div></button>
            <button class="opt on" data-pc="3"
                    data-tip="The default. Enough traffic to make dredging rights pay without gridlock.">
              <div class="k">3</div><div class="v">balanced</div></button>
            <button class="opt" data-pc="4"
                    data-tip="Crowded. The river silts fast and good routes die early.">
              <div class="k">4</div><div class="v">crowded</div></button>
          </div>
        </div>

        <div class="fieldset">
          <div class="lbl">Length</div>
          <div class="opts" id="lenOpts">
            <button class="opt" data-len="5" data-tip="A quick game. Not enough rounds for the river to fully close up.">
              <div class="k">Short</div><div class="v">5 rounds</div></button>
            <button class="opt on" data-len="8" data-tip="The tuned length — roughly a third of the delta silts shut by the end.">
              <div class="k">Standard</div><div class="v">8 rounds</div></button>
            <button class="opt" data-len="11" data-tip="Long. Expect most of the good water to be gone before the finish.">
              <div class="k">Long</div><div class="v">11 rounds</div></button>
          </div>
        </div>
      </div>

      <div class="setupCol">
        <div class="fieldset opponentsBox">
          <div class="lbl">Opponents</div>
          <div id="botRows"></div>
          <p class="fieldNote">Each plays to a different strategy. Hover one to see how it thinks.</p>
        </div>
      </div>
    </div>

    <div class="go">
      <button class="btnBig" id="btnTutorial">
        <span class="bt">Guided first game</span>
        <span class="bs">walks you through one round</span>
      </button>
      <button class="btnGhost" id="btnWatch">
        <span class="bt">Watch a game</span>
        <span class="bs">it plays itself and explains as it goes</span>
      </button>
      <button class="btnGhost" id="btnPlay">
        <span class="bt">Play</span>
        <span class="bs">jump straight in</span>
      </button>
      <button class="btnGhost btnNarrow" id="btnRulesMenu">Rules</button>
    </div>

    <details id="gloss">
      <summary>What the words mean</summary>
      <div class="glossBody" id="glossBody"></div>
    </details>
  </div>
</div>

<!-- ================= GAME =================
     Layout: board + reference sidebar on top, action bar across the full width
     beneath. The whole game used to live in a 352px column while the board sat in
     empty space — the controls you use every round were the most cramped thing on
     screen. The bar gets the width it needs; the sidebar keeps only what you read
     rather than what you press. -->
<div id="game" class="hide">
 <div id="top">
  <div id="board">
    <!-- padded viewBox: node art and labels overflow the 0..100 layout coords -->
  <svg id="svg" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet"></svg>
    <!-- Effects overlay. drawBoard() wipes #svg on every render, which would kill
         any animation mid-flight, so effects live in their own layer that nothing
         else clears. Same viewBox, so board coords need no transform. It must
         never eat clicks — the board underneath owns all interaction. -->
    <svg id="fx" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
    <!-- Whose action is currently resolving. Four players resolving in sequence
         is unreadable without this: you see effects with no author. -->
    <div id="actor" aria-live="polite"></div>

    <!-- Aiming prompt / build confirm bar. Floats over the board near where you
         aim, rather than down in the action bar away from the target. -->
    <div id="hint" class="prompt" style="display:none"></div>

    <!-- Pan/zoom. Keyboard and buttons as well as drag, because a trackpad drag
         on a board this size is fiddly and not everyone has a wheel. -->
    <div id="zoomBar">
      <button class="zoomBtn" id="zIn"  data-tip="Zoom in (+ or scroll)">+</button>
      <button class="zoomBtn" id="zOut" data-tip="Zoom out (− or scroll)">−</button>
      <button class="zoomBtn" id="zFit" data-tip="Fit the whole delta (0)">⤢</button>
    </div>

    <div id="tut">
      <div class="step" id="tutStep"></div>
      <h4 id="tutTitle"></h4>
      <p id="tutBody"></p>
      <div class="row">
        <button id="tutNext">Next</button>
        <button id="tutSkipStep">Skip step</button>
        <!-- Watch mode only; paintCaption hides it where speech is unsupported. -->
        <button id="tutSpeak" style="display:none">🔇 Voice off</button>
        <button id="tutSkip">Skip tutorial</button>
        <span class="wait" id="tutWait"></span>
      </div>
    </div>

    <div id="ov"><div class="card">
      <h2>Final score</h2>
      <div id="final"></div>
      <div class="go">
        <button class="btnBig" id="btnAgain">Play again</button>
        <button class="btnGhost" id="btnMenu">Menu</button>
      </div>
    </div></div>
  </div>

  <aside>
    <header>
      <svg><use href="#ic-river" data-logo/></svg>
      <div class="t">
        <h2 id="hTitle">ANOD</h2>
        <div class="sub"><span id="rd">Round 1 / 8</span> · <span id="ph">Program</span></div>
      </div>
      <!-- Animations you cannot skip become an annoyance by round 3. -->
      <button class="icoBtn" id="btnSpeed" data-tip-title="Animation speed" data-tip="How fast opponents' actions play out. Cycles 1x, 2x, off. Turning it off resolves the round instantly.">1×</button>
      <button class="icoBtn" id="btnRules" data-tip-title="Rulebook" data-tip="The full rules, and a glossary of every term used on this screen.">Rules</button>
      <button class="icoBtn" id="btnQuit">Menu</button>
    </header>

    <!-- Sidebar order is now by how often you look at it, not by source order.
         Five equal-weight panes gave the eye no entry point: the commit button —
         the one control pressed every single round — carried the same weight as a
         contract line. Program first and dominant; everything else is reference. -->

    <!-- WHAT YOU ARE WORKING TOWARD -->
    <div class="pane">
      <div class="paneHead">
        <h3 id="hContracts">Contracts</h3>
        <span class="count" id="ctCount"></span>
      </div>
      <!-- Survey picker drops in here, above the hand, so you choose which of the
           three drawn contracts to keep with the board and your hand in view. -->
      <div id="survey"></div>
      <div id="cts"></div>
    </div>

    <!-- WHO ELSE IS AT THE TABLE -->
    <div class="pane">
      <div class="paneHead"><h3 id="hPlayers">Players</h3></div>
      <div id="pls"></div>
    </div>

    <!-- CLAIMED CHANNELS — the dredging-rights tug-of-war. The board shows only
         who owns each channel now; this shows the marker counts, so you can read
         how safe your claims are and how close a rival's is to flipping. -->
    <div class="pane" id="claimsPane">
      <div class="paneHead"><h3 id="hClaims">Claimed channels</h3></div>
      <div id="claims"></div>
    </div>

    <!-- Reference, not per-turn information. Collapsed by default: it taught you
         the depth colours once and then took up permanent room. -->
    <details class="pane" id="legendPane">
      <summary><h3 id="hWater">The water</h3></summary>
      <div class="legend">
        <span><i style="background:var(--water3)"></i><span id="legDeep">deep 3</span></span>
        <span><i style="background:var(--water2)"></i><span id="legMid">2</span></span>
        <span><i style="background:var(--water1)"></i><span id="legShallow">1 — fragile</span></span>
        <span><i style="background:var(--dead);outline:1px dashed #6b4a2c"></i><span id="legDead">silted</span></span>
      </div>
    </details>

    <div class="log" id="log"></div>
  </aside>
 </div>

 <!-- ACTION BAR — everything you press, across the full width.
      Slots on the left, the four actions in the middle where they have room to be
      real buttons, commit on the right. -->
 <div id="bar">
   <div class="barLead">
     <h3 id="hProgram">Your program</h3>
     <!-- The one rule new players trip on: your two actions lock in and resolve
          in order, and silt only settles AFTER both. So you cannot ship a river
          and repair it the same turn. This line says so where you program. -->
     <div id="orderHint" class="orderHint"></div>
     <div class="barSlots">
       <div class="slot" id="s0" data-slot="0"><div class="n">SLOT 1</div><div class="a">—</div></div>
       <div class="slot" id="s1" data-slot="1"><div class="n">SLOT 2</div><div class="a">—</div></div>
     </div>
   </div>
   <div class="acts" id="acts"></div>
   <div class="barGo">
     <span class="stepHint" id="progHint">pick two</span>
     <button id="go" disabled>Commit &amp; resolve</button>
   </div>
 </div>
</div>

<div id="book">
      <div class="bookCard">
        <div class="bookHead">
          <div>
            <div class="bookTitle" id="bkTitle"></div>
            <div class="bookSub" id="bkSub"></div>
          </div>
          <button class="icoBtn" id="bkClose">Close</button>
        </div>
        <div class="bookBody" id="bkBody"></div>
        <div class="bookFoot">
          <button class="pageBtn" id="bkPrev">‹ Back</button>
          <div class="dots" id="bkDots"></div>
          <button class="pageBtn" id="bkNext">Next ›</button>
        </div>
      </div>
    </div>

<script type="module" src="./ui.js"></script>
</body>
</html>
